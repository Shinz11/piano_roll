<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #1a1a2e; color: #e0e0e0;

}
#piano-roll-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }

#main-row { flex: 1; display: flex; min-height: 0; }

  transition: background-color 0.2s, color 0.2s;

<script>
"use strict";
// ============================================================
// Supabase 設定
// ============================================================
const SUPABASE_URL      = "https://ptyqyvghqrtczeukcwfp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0eXF5dmdocXJ0Y3pldWtjd2ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTc2ODUsImV4cCI6MjA5MDQzMzY4NX0.8BBnoyhbM_8hBBtz7D6rGlZGdTsamh6qX8egNZgAUrU";

async function supabaseInsert(table, record) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Prefer": "return=representation",
    },
    body: JSON.stringify(record),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ============================================================
// 定数
// ============================================================
const TOTAL_NOTES  = 8;
const NOTE_NAMES   = ["1","2","3","4","5","6","7","1'"];
// 7平均律: 1オクターブ(1200¢)を7等分 → 1ステップ = 1200/7 ≈ 171.43¢
// pitchOffsets による微調整は引き続き有効
const EDO7_STEP_CENTS = 1200 / 7;           // ≈ 171.4286¢
const EDO7_SEMITONES  = Array.from({length: 8}, (_, i) => i * EDO7_STEP_CENTS / 100);
const BASE_HZ      = 261.62;
const MAX_CENTS    = EDO7_STEP_CENTS;

// Cのピッチインデックス（下=0, 上=7）
const C_LOW  = 0;
const C_HIGH = 7;

const NOTE_H       = 90;
const SUBDIVISIONS = 4;
const TOTAL_BEATS  = 16;   // 4拍×4小節
const KB_W         = 160;
const RULER_H      = 30;
const BORDER_HOT   = 8;
const RESIZE_HOT   = 14;
// BEAT_W・CELL_W・GRID_W は resizeCanvases() で動的計算
let BEAT_W = 160;
let CELL_W = BEAT_W / SUBDIVISIONS;
let GRID_W = BEAT_W * TOTAL_BEATS;

const C = {
  bgC:"#0f3460", bgLight:"#16213e",
  measure:"#e94560", beat:"#4a4a6a", sub:"#2a2a4a",
  keyC:"#f0f0f0", keyCText:"#df2828", keyWhite:"#f0f0f0", keyBorder:"#555",
  tunePos:"#00e5ff", tuneNeg:"#ff6e9c",
};

// ============================================================
// ループ（リピート）状態
// ============================================================
let loopEnabled   = true;
let loopStartBeat = 0;
let loopEndBeat   = 8; // 初期値は最初の8拍（2小節）

// ループボタンの切り替え処理（スクリプトの下の方、イベントリスナー群に追加）
document.getElementById('btn-loop').addEventListener('click', (e) => {
  loopEnabled = !loopEnabled;
  const btn = e.target;
  if (loopEnabled) {
    btn.style.background = '#f0a040'; // Logic風の黄色
    btn.style.color = '#000';
    btn.style.borderColor = '#d08020';
  } else {
    btn.style.background = '#2a2a4a';
    btn.style.color = '#8b949e';
    btn.style.borderColor = '#4a4a6a';
  }
  drawRuler();
});

// ============================================================
// メトロノーム
// ============================================================
let metronomeEnabled = false; // メトロノームのON/OFF状態
let lastClickBeat = -1;       // 最後にクリックを鳴らした拍を記録

// メトロノームの音（「カッ」という短い音）を生成
function playClick(isDownbeat) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  // 1拍目は少し高く（1000Hz）、それ以外は低め（800Hz）にしてアクセントをつける
  osc.frequency.value = isDownbeat ? 1000 : 800;
  
  // 非常に短い減衰音を作る（クリック感）
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);

  osc.connect(gain);
  gain.connect(audioCtx.destination); 

  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

// ============================================================
// 状態
// ============================================================
let notes       = [];
let noteIdSeq   = 0;
const newNote   = (pitch, start, duration, velocity=100) =>
  ({ id: noteIdSeq++, pitch, start, duration, velocity });

let pitchOffsets = new Array(TOTAL_NOTES).fill(0);
let rowHeights   = new Array(TOTAL_NOTES).fill(NOTE_H);
let rowTops      = new Array(TOTAL_NOTES).fill(0);

window._nh = NOTE_H;

function getNH() { return window._nh || NOTE_H; }

// ============================================================
// C連動: 下のC(pitch=0)と上のC(pitch=7)を同期させる
// ============================================================
function syncCPitches(changedPitch) {
  if (changedPitch === C_LOW) {
    pitchOffsets[C_HIGH] = pitchOffsets[C_LOW];
  } else if (changedPitch === C_HIGH) {
    pitchOffsets[C_LOW] = pitchOffsets[C_HIGH];
  }
}

function recomputeRows() {
  const nh = getNH();
  // 隣の鍵盤（1ステップ）までのセント数 (7平均律の場合は約171.4¢)
  const stepCents = EDO7_STEP_CENTS; 

  // 1. 各行の「仮想的な中心Y座標」を計算
  const centerY = new Array(TOTAL_NOTES);
  for (let i = 0; i < TOTAL_NOTES; i++) {
    const p = TOTAL_NOTES - 1 - i;
    // 基本の中心位置から、チューニングの割合に応じてY座標を上下にずらす
    // （セントがプラス＝音が高い＝画面の上方向へ移動）
    centerY[i] = (i + 0.5) * nh - (pitchOffsets[p] / stepCents) * nh;
  }

  // 2. 境界線（各行のTopとBottom）を、隣り合う中心座標の中点として計算
  const B = new Array(TOTAL_NOTES + 1);
  B[0] = 0; // 一番上の線は固定
  for (let i = 1; i < TOTAL_NOTES; i++) {
    B[i] = (centerY[i - 1] + centerY[i]) / 2;
  }
  B[TOTAL_NOTES] = TOTAL_NOTES * nh; // 一番下の線は固定

  // 3. 境界線の逆転（鍵盤の高さがマイナスになる）を防ぐ安全装置
  const MIN_H = 6;
  for (let i = 1; i < TOTAL_NOTES; i++) {
    if (B[i] < B[i - 1] + MIN_H) B[i] = B[i - 1] + MIN_H;
  }
  for (let i = TOTAL_NOTES - 1; i >= 1; i--) {
    if (B[i] > B[i + 1] - MIN_H) B[i] = B[i + 1] - MIN_H;
  }

  // 4. 最終的な rowTops と rowHeights を確定
  for (let i = 0; i < TOTAL_NOTES; i++) {
    rowTops[i] = B[i];
    rowHeights[i] = B[i + 1] - B[i];
  }
}

function totalHeight() { return getNH() * TOTAL_NOTES; }
function getCentsPx()  { return(2*EDO7_STEP_CENTS)/ getNH() ; }

function yToRow(y) {
  for (let i = 0; i < TOTAL_NOTES; i++)
    if (y >= rowTops[i] && y < rowTops[i] + rowHeights[i]) return i;
  return -1;
}

function pitchToHz(pitch, cents=0) {
  // 7平均律基準音 + pitchOffsets による微調整（¢）
  return BASE_HZ * Math.pow(2, (EDO7_SEMITONES[pitch] + cents / 100) / 12);
}

function centsToFill(cents, lightnessOffset = 0) {
  const t = Math.min(1, Math.abs(cents) / EDO7_STEP_CENTS);
  
  // ±0の時（デフォルト）
  if (Math.abs(cents) < 1) return `hsl(345, 80%, ${60 + lightnessOffset}%)`;

  if (cents > 0) {
    // プラス方向： 水色(190) → 黄色(50)
    const hue = 190 - (t * 140);
    return `hsl(${Math.round(hue)}, 90%, ${60 + lightnessOffset}%)`;
  } else {
    // マイナス方向： 紫(280) → 青(220)
    const hue = 280 - (t * 60);
    return `hsl(${Math.round(hue)}, 80%, ${65 + lightnessOffset}%)`;
  }
}

function noteRect(note) {
  const p   = note.pitch;
  const row = TOTAL_NOTES - 1 - p;
  const rh  = rowHeights[row];
  const rt  = rowTops[row];
  return { x: note.start * BEAT_W, y: rt + 1, w: Math.max(2, note.duration * BEAT_W - 2), h: Math.max(2, rh - 2) };
}

// ============================================================
// Web Audio（録音対応）
// ============================================================
let audioCtx        = null;
let masterGain      = null;   // 全音声をまとめるGainノード

function ensureAudio() {
  if (!audioCtx) {
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.9;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(hz, durationSec, velocity=100) {
  ensureAudio();
  const now  = audioCtx.currentTime;
  const vol  = (velocity / 127) * 0.28;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(vol, now + 0.01);
  gain.gain.setValueAtTime(vol, now + durationSec - 0.06);
  gain.gain.linearRampToValueAtTime(0, now + durationSec);
  gain.connect(masterGain);
  const osc  = audioCtx.createOscillator();
  osc.type   = 'triangle';
  osc.frequency.value = hz;
  osc.connect(gain);
  osc.start(now); osc.stop(now + durationSec);
}

// チューニングドラッグ中の持続音（リアルタイムピッチ変更対応）
let tuneOsc = null, tuneGain = null;
function startTuneOsc(hz) {
  ensureAudio();
  stopTuneOsc();
  tuneGain = audioCtx.createGain();
  tuneGain.gain.setValueAtTime(0, audioCtx.currentTime);
  tuneGain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.02);
  tuneGain.connect(masterGain);
  tuneOsc = audioCtx.createOscillator();
  tuneOsc.type = 'triangle';
  tuneOsc.frequency.value = hz;
  tuneOsc.connect(tuneGain);
  tuneOsc.start();
}
function updateTuneOsc(hz) {
  if (tuneOsc) tuneOsc.frequency.setTargetAtTime(hz, audioCtx.currentTime, 0.01);
}
function stopTuneOsc() {
  if (tuneOsc) {
    try {
      tuneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
      tuneOsc.stop(audioCtx.currentTime + 0.08);
    } catch(e) {}
    tuneOsc = null; tuneGain = null;
  }
}

// ============================================================
// 録音機能（WAV出力）
// PCMサンプルを ScriptProcessorNode で収集し、停止時に WAV 化
// ============================================================
let isRecording     = false;
let recScriptNode   = null;   // ScriptProcessorNode
let recSamples      = [];     // Float32Array を貯める配列
let recSampleRate   = 44100;

function startRecording() {
  ensureAudio();

  //録音開始時にループがONならOFFにする
  if(loopEnabled){
    document.getElementById('btn-loop').click();
  }

  recSamples    = [];
  recSampleRate = audioCtx.sampleRate;

  // ScriptProcessorNode（バッファ4096サンプル、入力1ch、出力1ch）
  recScriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
  recScriptNode.onaudioprocess = ev => {
    if (!isRecording) return;
    // Float32Array をコピーして蓄積（元バッファは上書きされるため）
    recSamples.push(new Float32Array(ev.inputBuffer.getChannelData(0)));
  };
  // masterGain → recScriptNode → audioCtx.destination（無音でOK）
  masterGain.connect(recScriptNode);
  recScriptNode.connect(audioCtx.destination);

  isRecording = true;
  const btn = document.getElementById('btn-record');
  btn.textContent = '⏹ 録音停止';
  btn.classList.add('recording');
  updateStatus('🔴 録音中… 停止するには「録音停止」ボタンを押してください');

  stopPlay();
  playheadBeat=0;
  startPlay();
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;

  // ノードを切り離す
  if (recScriptNode) {
    try { masterGain.disconnect(recScriptNode); } catch(e) {}
    try { recScriptNode.disconnect(); } catch(e) {}
    recScriptNode = null;
  }

  const btn = document.getElementById('btn-record');
  btn.textContent = '⏺ 録音';
  btn.classList.remove('recording');

  stopPlay();

  // サンプルが空なら終了
  if (recSamples.length === 0) { updateStatus('録音データがありません'); return; }

  // 7EDO録音WAV（リアルタイム収集済みPCM）をダウンロード
  const totalLen = recSamples.reduce((s, b) => s + b.length, 0);
  const pcm      = new Float32Array(totalLen);
  let offset = 0;
  let maxPeak = 0; // 最大音量を記録する変数

  // 配列の結合と最大ピーク（一番大きい音）の検出
  for (const buf of recSamples) {
    pcm.set(buf, offset);
    offset += buf.length;
    for(let i = 0; i < buf.length; i++) {
      const abs = Math.abs(buf[i]);
      if(abs > maxPeak) maxPeak = abs;
    }
  }

  // ★追加: 【音割れ防止ノーマライズ】
  // 最大値が0.95（限界の少し手前）を超える場合、全体を縮小して音割れを防ぐ
  if (maxPeak > 0.95) {
    const scale = 0.95 / maxPeak; 
    for (let i = 0; i < pcm.length; i++) {
      pcm[i] *= scale;
    }
  }

  const ts = Date.now();
  downloadWAV(encodeWAV(pcm, recSampleRate), `pianoroll_7edo_${ts}.wav`);
  updateStatus('録音完了 — WAVファイルをダウンロードしました');
}

/** WAV ArrayBuffer をファイルとしてダウンロード */
function downloadWAV(wavBuf, filename) {
  const blob = new Blob([wavBuf], { type: 'audio/wav' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// 12平均律: ダイアトニック音名→半音数マッピング (C D E F G A B C)
const DIATONIC_SEMITONES_12 = [0, 2, 4, 5, 7, 9, 11, 12];

/** Float32Array の PCM データを WAV ArrayBuffer に変換 */
function encodeWAV(samples, sampleRate) {
  const numCh     = 1;
  const bitsPerSample = 16;
  const byteRate  = sampleRate * numCh * bitsPerSample / 8;
  const blockAlign= numCh * bitsPerSample / 8;
  const dataLen   = samples.length * blockAlign;
  const buf       = new ArrayBuffer(44 + dataLen);
  const view      = new DataView(buf);

  function writeStr(off, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
  }
  writeStr(0,  'RIFF');
  view.setUint32(4,  36 + dataLen, true);
  writeStr(8,  'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);           // chunk size
  view.setUint16(20, 1,  true);           // PCM
  view.setUint16(22, numCh, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeStr(36, 'data');
  view.setUint32(40, dataLen, true);

  // Float32 → Int16 変換
  let off = 44;
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    off += 2;
  }
  return buf;
}

// ============================================================
// シーケンサー
// ============================================================
let isPlaying = false, playheadBeat = 0, playStartTime = 0, playStartBeat = 0;
let playedIds = new Set(), rafId = null;
function getBpm() { return 90; }

function startPlay() {
  ensureAudio();
  isPlaying = true; playStartTime = audioCtx.currentTime;
  playStartBeat = playheadBeat; playedIds.clear();
  document.getElementById('btn-play').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  rafId = requestAnimationFrame(seqTick);
}
function stopPlay() {
  lastClickBeat= -1;
  isPlaying = false;
  if (rafId) cancelAnimationFrame(rafId);
  playheadBeat = 0;
  document.getElementById('btn-play').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  drawAll();
}
function seqTick() {
  const bpm = getBpm(), bps = bpm / 60;
  playheadBeat = playStartBeat + (audioCtx.currentTime - playStartTime) * bps;
  
  //メトロノームの判定
  if (metronomeEnabled) {
    const currentBeatIndex = Math.floor(playheadBeat);
    // 新しい拍に入った瞬間にだけ音を鳴らす
    if (currentBeatIndex !== lastClickBeat) {
      // 4拍子を想定（拍数を4で割った余りが0なら強拍）
      playClick(currentBeatIndex % 4 === 0);
      lastClickBeat = currentBeatIndex;
    }
  }

  //録音中の自動停止判定
  if (isRecording) {
    // 最後に配置されたノートの「終了拍」を計算（ノートが1つもなければ0）
    const lastNoteEnd = notes.length > 0 
      ? notes.reduce((max, n) => Math.max(max, n.start + n.duration), 0) 
      : 0;
    
    // 音の余韻（リリース）が不自然にプツッと切れないよう、0.5拍（8分音符分）の余裕を持たせる
    // ※ただし、グリッドの最大値（TOTAL_BEATS = 16）は超えないように Math.min でガードする
    const autoStopBeat = Math.min(lastNoteEnd + 0.5, TOTAL_BEATS);

    if (playheadBeat >= autoStopBeat) {
      document.getElementById('btn-record').click(); // 録音停止を擬似クリック
      return; // 停止したらこれ以上進まないように関数を抜ける
    }
  }

  // 現在の終了地点を決定（ループONならloopEndBeat、OFFなら最後まで）
  let isLooping = loopEnabled && (loopEndBeat > loopStartBeat);
  let currentEnd = isLooping ? loopEndBeat : TOTAL_BEATS;

  // 終了地点に到達した時の処理
  if (playheadBeat >= currentEnd) {
    if (isLooping) {
      lastClickBeat= -1;
      // 音楽的なズレをなくすため、超過分(overshoot)を計算して頭に戻す
      const overshoot = playheadBeat - currentEnd;
      playheadBeat = loopStartBeat + overshoot;
      playStartBeat = loopStartBeat;
      playStartTime = audioCtx.currentTime - (overshoot / bps);
    } else {
      // ループOFFの場合は0に戻る（または停止させるのもあり）
      playheadBeat = 0;
      playStartBeat = 0;
      playStartTime = audioCtx.currentTime;
    }
    playedIds.clear(); // 鳴らした音の履歴をリセット
  }
  
  const win = (1 / SUBDIVISIONS) * 0.6;
  for (const n of notes) {
    if (!playedIds.has(n.id) && Math.abs(n.start - playheadBeat) < win) {
      playedIds.add(n.id);
      playTone(pitchToHz(n.pitch, pitchOffsets[n.pitch]), (n.duration / bps) * 0.92, n.velocity);
    }
  }
  drawGrid();
  drawKeyboard(); // ★ここを追加：再生中も鍵盤を描画更新する
  if (isPlaying) rafId = requestAnimationFrame(seqTick);
}

function resizeCanvases() {
  const areaH = document.getElementById('piano-roll-area').clientHeight;
  const gridWrap=document.getElementById('grid-wrap');

  const rowH  = Math.floor((areaH - RULER_H) / TOTAL_NOTES);
  const mainH = rowH * TOTAL_NOTES;
  window._nh  = rowH;

  // グリッド幅 = grid-wrapの実幅そのまま（端数ゼロ）
  GRID_W = areaW;
  BEAT_W = GRID_W / TOTAL_BEATS;   // floatのまま保持
  CELL_W = BEAT_W / SUBDIVISIONS;

  corner.style.height = RULER_H + 'px';

  gridCanvas.height = mainH;
  gridWrap.style.height = mainH + 'px';

// ============================================================
// 描画: ルーラー
// ============================================================
function drawRuler() {
  const ctx = rulerCtx;
  ctx.clearRect(0, 0, GRID_W, RULER_H);
  ctx.fillStyle = C.bgLight; ctx.fillRect(0, 0, GRID_W, RULER_H);
  
  // --- ループ範囲の描画（追加部分） ---
  if (loopEnabled) {
    const x = loopStartBeat * BEAT_W;
    const w = (loopEndBeat - loopStartBeat) * BEAT_W;
    // 背景のハイライト
    ctx.fillStyle = 'rgba(240, 160, 64, 0.15)'; 
    ctx.fillRect(x, 0, w, RULER_H);
    // 上部の黄色い太線
    ctx.fillStyle = '#f0a040';
    ctx.fillRect(x, 0, w, 4);
  }
  // ------------------------------------

  // 既存の線と数字の描画
  for (let b = 0; b <= TOTAL_BEATS; b++) {
    const x = b * BEAT_W;
    if (b % 4 === 0) {
      ctx.strokeStyle = C.measure; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,RULER_H); ctx.stroke();
      ctx.fillStyle = C.measure; ctx.font = 'bold 11px Courier New';
      ctx.fillText(b/4+1, x+4, RULER_H-8);
    } else {
      ctx.strokeStyle = C.beat; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x,RULER_H/2); ctx.lineTo(x,RULER_H); ctx.stroke();
    }
  }
  ctx.strokeStyle='#333'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,RULER_H-1); ctx.lineTo(GRID_W,RULER_H-1); ctx.stroke();
}

// ============================================================
// 描画: 鍵盤
// ============================================================
function drawKeyboard() {
  const ctx = kbCtx;
  ctx.clearRect(0, 0, KB_W, kbCanvas.height);

  // ▼ 追加：現在再生中のピッチ（音の高さ）をリストアップ ▼
  const activePitches = new Set();
  if (isPlaying) {
    for (const n of notes) {
      // プレイヘッドが、このノートの「開始位置」から「終了位置」の間にあるか判定
      if (playheadBeat >= n.start && playheadBeat < n.start + n.duration) {
        activePitches.add(n.pitch);
      }
    }
  }
  // ▲ 追加ここまで ▲

  for (let i = 0; i < TOTAL_NOTES; i++) {
    const p     = TOTAL_NOTES - 1 - i;
    const name  = NOTE_NAMES[p];
    const isC   = name === 'C';
    const rt    = rowTops[i], rh = rowHeights[i];
    const cents = pitchOffsets[p];

    // ▼ 修正：再生中のピッチならハイライト色（明るい水色）にする ▼
    if (activePitches.has(p)) {
      ctx.fillStyle = '#b3e5fc'; // 光る色（シアン系の明るい色）
    } else {
      ctx.fillStyle = isC ? C.keyC : C.keyWhite; // 通常の色
    }
    // ▲ 修正ここまで ▲

    ctx.fillRect(0, rt, KB_W-2, rh);

    if (Math.abs(cents) > 0.5) {
      const bh = Math.max(2, (Math.abs(cents)/MAX_CENTS) * rh * 0.4);
      ctx.fillStyle = cents > 0 ? C.tunePos : C.tuneNeg;
      ctx.globalAlpha = 0.9;
      ctx.fillRect(0, cents > 0 ? rt : rt + rh - bh, 5, bh);
      ctx.globalAlpha = 1;
    }

    const isHot = (p === kbHoverBorderPitch || (kbIsTuning && p === kbTunePitch));
    ctx.strokeStyle = C.keyBorder; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,rt); ctx.lineTo(KB_W-2,rt); ctx.stroke();
    ctx.strokeStyle = isHot ? (cents>=0 ? C.tunePos : C.tuneNeg) : C.keyBorder;
    ctx.lineWidth   = isHot ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(0,rt+rh-1); ctx.lineTo(KB_W-2,rt+rh-1); ctx.stroke();

    if (rh >= 14) {
      const fs = Math.max(7, Math.min(14, Math.floor(rh/5)));
      ctx.fillStyle = isC ? C.keyCText : '#555';
      ctx.font = `${isC?'bold':'normal'} ${fs}px Courier New`;
      ctx.fillText(name, 7, rt + rh/2 + fs*0.35);
    }
    if (Math.abs(cents) > 0.5 && rh >= 10) {
      const ci = Math.round(cents), sign = ci>0?'+':'';
      const fs = Math.max(10, Math.min(16, Math.floor(rh/3)));
      ctx.fillStyle = cents>0 ? C.tunePos : C.tuneNeg;
      ctx.font = `bold ${fs}px Courier New`;
      ctx.textAlign = 'right';
      ctx.fillText(`${sign}${ci}¢`, KB_W-4, rt+rh/2+fs*0.35);
      ctx.textAlign = 'left';
    }
  }
  ctx.strokeStyle='#444'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(KB_W-1,0); ctx.lineTo(KB_W-1,kbCanvas.height); ctx.stroke();
}

// ============================================================
// 描画: グリッド
// ============================================================
function drawGrid() {
  const ctx = gridCtx;
  ctx.clearRect(0, 0, GRID_W, gridCanvas.height);
  for (let i = 0; i < TOTAL_NOTES; i++) {
    const p  = TOTAL_NOTES-1-i, rt = rowTops[i], rh = rowHeights[i], cv = pitchOffsets[p];
    ctx.fillStyle = NOTE_NAMES[p]==='C' ? C.bgC : C.bgLight;
    ctx.fillRect(0, rt, GRID_W, rh);
    if (Math.abs(cv) > 0.5) {
      ctx.strokeStyle = cv>0 ? C.tunePos : C.tuneNeg;
      ctx.globalAlpha = 0.18; ctx.setLineDash([4,6]); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(0,rt+rh/2); ctx.lineTo(GRID_W,rt+rh/2); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha=1;
    }
  }
  for (let col = 0; col <= TOTAL_BEATS*SUBDIVISIONS; col++) {
    const x = col * CELL_W;
    ctx.strokeStyle = col%(SUBDIVISIONS*4)===0 ? C.measure
                    : col%SUBDIVISIONS===0      ? C.beat : C.sub;
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,totalHeight()); ctx.stroke();
  }
  ctx.strokeStyle=C.sub; ctx.lineWidth=1;
  for (let i=0;i<TOTAL_NOTES;i++){
    ctx.beginPath(); ctx.moveTo(0,rowTops[i]); ctx.lineTo(GRID_W,rowTops[i]); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0,totalHeight()); ctx.lineTo(GRID_W,totalHeight()); ctx.stroke();

  for (const n of notes) drawNote(ctx,n,false);
  if ((dragState.mode==='placing' || dragState.mode==='moving') && dragState.ghost) {
    drawNote(ctx, dragState.ghost, true);
  }

  if (isPlaying) {
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(playheadBeat*BEAT_W,0); ctx.lineTo(playheadBeat*BEAT_W,totalHeight()); ctx.stroke();
  }
}

function drawNote(ctx, note, ghost) {
  const r = noteRect(note), cents = pitchOffsets[note.pitch];
  
  const grad = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);

  if (ghost) {
    // マウスカーソルに追従する仮配置ノート（これは少し透けさせておきます）
    grad.addColorStop(0, 'rgba(160,220,255,0.7)');
    grad.addColorStop(1, 'rgba(100,200,255,0.3)');
    ctx.strokeStyle = 'rgba(160,220,255,0.8)';
  } else {
    // 確定したノート：透明度を使わず、明るさ（L）の増減で立体感を作る
    grad.addColorStop(0, centsToFill(cents, 8));   // 上部は少し明るく (+8%)
    grad.addColorStop(1, centsToFill(cents, -12)); // 下部は少し暗く (-12%)
    
    // 枠線も不透明に。本体の下部よりもさらに暗くして引き締める
    ctx.strokeStyle = Math.abs(cents) < 1 
      ? '#ff5e7a' 
      : centsToFill(cents, -20); 
  }
  
  ctx.fillStyle = grad;
  ctx.lineWidth = 1; 
  ctx.fillRect(r.x, r.y, r.w, r.h); 
  ctx.strokeRect(r.x, r.y, r.w, r.h);
  
  // テキストの描画
  if (r.w > 22 && r.h > 8) {
    const nm = NOTE_NAMES[note.pitch], ci = Math.round(cents), sign = ci > 0 ? '+' : '';
    const lbl = Math.abs(ci) > 0.5 ? `${nm}${sign}${ci}¢` : nm;
    const fs = Math.max(8, Math.min(13, Math.floor(r.h / 3)));
    
    ctx.fillStyle = '#fff'; 
    ctx.font = `bold ${fs}px Courier New`;
    ctx.textAlign = 'center'; 
    ctx.fillText(lbl, r.x + r.w / 2, r.y + r.h / 2 + fs * 0.35, r.w - 4); 
    ctx.textAlign = 'left';
  }
}

function drawAll() { recomputeRows(); drawRuler(); drawKeyboard(); drawGrid(); }


// ============================================================
// ルーラー（ループ範囲）マウス操作
// ============================================================
let rulerDrag = { active: false, start: 0 };

rulerCanvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  // クリックした拍を計算（整数に丸める）
  const beat = Math.floor(e.offsetX / BEAT_W);
  rulerDrag.active = true;
  rulerDrag.start  = beat;
  loopStartBeat    = beat;
  loopEndBeat      = beat + 1; // 最低1拍
  
  // ドラッグ開始と同時にループを強制ONにする（Logicと同じ挙動）
  if (!loopEnabled) document.getElementById('btn-loop').click();
  drawRuler();
});

rulerCanvas.addEventListener('mousemove', e => {
  if (!rulerDrag.active) return;
  // ドラッグ中の現在の拍を計算
  let currentBeat = Math.round(e.offsetX / BEAT_W);
  
  // 開始位置と現在位置でStartとEndを決定
  if (currentBeat > rulerDrag.start) {
    loopStartBeat = rulerDrag.start;
    loopEndBeat   = currentBeat;
  } else if (currentBeat < rulerDrag.start) {
    loopStartBeat = currentBeat;
    loopEndBeat   = rulerDrag.start;
  }
  if (loopStartBeat === loopEndBeat) loopEndBeat = loopStartBeat + 1; // 潰れないように
  
  drawRuler();
});

rulerCanvas.addEventListener('mouseup', () => rulerDrag.active = false);
rulerCanvas.addEventListener('mouseleave', () => rulerDrag.active = false);

rulerCanvas.addEventListener('contextmenu', e => {
  e.preventDefault(); // ブラウザ標準の右クリックメニューを無効化
  
  // ループがONの場合のみ、OFFに切り替える（ボタンのクリックイベントを呼び出す）
  if (loopEnabled) {
    document.getElementById('btn-loop').click();
  }
});

// ============================================================
// 鍵盤マウス操作
// ============================================================
let kbIsTuning=false, kbTunePitch=-1, kbTuneStartY=0, kbTuneStartCents=0, kbHoverBorderPitch=-1;
let kbHoverRowPitch = -1;  // 現在マウスが乗っている行のピッチ（矢印キー操作対象）
let sliderOpsCount=0;

// 各行の「下の線」でヒット判定
// rowTops[i]+rowHeights[i] が行iの底辺 = ピッチ(TOTAL_NOTES-1-i)の下線
// 行iの底辺をドラッグ → ピッチ(TOTAL_NOTES-1-i)のチューニング
function borderPitchAt(y) {
  for (let i = 0; i < TOTAL_NOTES; i++) {
    const bottom = rowTops[i] + rowHeights[i];
    if (Math.abs(y - bottom) <= BORDER_HOT) return TOTAL_NOTES - 1 - i;
  }
  return -1;
}

// 指定したピッチ(p)が「現在動けるセント値の範囲」を動的に計算する
function getDynamicLimits(p) {
  const S = EDO7_STEP_CENTS;
  
  // 上隣と下隣のピッチインデックスを取得（Cの音はオクターブを跨いで判定）
  const upperP = (p === 7) ? 1 : p + 1;
  const lowerP = (p === 0) ? 6 : p - 1;
  
  // 隣の音が今どれだけズレているか(pitchOffsets)を考慮して限界を計算
  // ±1 は「完全に重ならないための1セントの壁（余裕）」です
  return {
    min: -S + pitchOffsets[lowerP] + 1,
    max:  S + pitchOffsets[upperP] - 1
  };
}

kbCanvas.addEventListener('mousemove', e => {
  const y=e.offsetY;
  // ホバー中の行ピッチを常時追跡（矢印キー操作のため）
  const hrow = yToRow(y);
  kbHoverRowPitch = hrow >= 0 ? TOTAL_NOTES - 1 - hrow : -1;

  if (kbIsTuning&&kbTunePitch>=0) {
    // 自分専用の「現在の限界値」を取得
    const limits = getDynamicLimits(kbTunePitch);
    // マウスの移動量から計算したセント値
    const rawCents = kbTuneStartCents + (kbTuneStartY - y) * getCentsPx();
    
    // 上限・下限の範囲内に収める
    const nc = Math.max(limits.min, Math.min(limits.max, rawCents));
    
    pitchOffsets[kbTunePitch]=Math.round(nc);
    // C連動
    syncCPitches(kbTunePitch);
    // ドラッグ中リアルタイム発音
    updateTuneOsc(pitchToHz(kbTunePitch, pitchOffsets[kbTunePitch]));
    recomputeRows(); drawKeyboard(); drawGrid(); return;
  }
  const bp=borderPitchAt(y);
  if (bp!==kbHoverBorderPitch) {
    kbHoverBorderPitch=bp; kbCanvas.style.cursor=bp>=0?'ns-resize':'default'; drawKeyboard();
  }
});
kbCanvas.addEventListener('mousedown', e => {
  e.preventDefault(); const y=e.offsetY, bp=borderPitchAt(y);
  if (bp>=0) {
    kbIsTuning=true; kbTunePitch=bp; kbTuneStartY=y; kbTuneStartCents=pitchOffsets[bp]; sliderOpsCount++;
    // ドラッグ開始時に音を鳴らす
    startTuneOsc(pitchToHz(bp, pitchOffsets[bp]));
  } else {
    const row=yToRow(y);
    if (row>=0) {
      const p=TOTAL_NOTES-1-row, cents=pitchOffsets[p];
      playTone(pitchToHz(p,cents),0.5);
      updateStatus(`発音: ${NOTE_NAMES[p]}  ${cents?(cents>0?'+':'')+Math.round(cents)+'¢':''}`);
    }
  }
});
kbCanvas.addEventListener('mouseup', () => {
  stopTuneOsc();
  kbIsTuning=false; kbTunePitch=-1;
});
kbCanvas.addEventListener('mouseleave',() => {
  stopTuneOsc();
  kbIsTuning=false; kbTunePitch=-1; kbHoverBorderPitch=-1; kbHoverRowPitch=-1;
  kbCanvas.style.cursor='default'; drawKeyboard();
});
kbCanvas.addEventListener('dblclick', e => {
  const bp=borderPitchAt(e.offsetY);
  if (bp>=0) {
    pitchOffsets[bp]=0;
    // C連動リセット
    syncCPitches(bp);
    recomputeRows(); drawKeyboard(); drawGrid();
  }
});

// ============================================================
// グリッドマウス操作（ドラッグ移動対応版）
// ============================================================
// originalNote を追加して移動前の状態を保存できるようにする
const dragState={mode:null, ghost:null, startX:0, resizeNote:null, resizeStartDur:0, resizeStartX:0, originalNote:null};

function snapBeat(b) { return Math.floor(b); } // 拍頭（整数）のみ

function noteAtPixel(px,py) {
  for (let i=notes.length-1;i>=0;i--) {
    const r=noteRect(notes[i]);
    if (px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h) return notes[i];
  }
  return null;
}

gridCanvas.addEventListener('mousemove', e => {
  e.preventDefault(); const px=e.offsetX,py=e.offsetY;
  
  if (dragState.mode==='placing' && dragState.ghost) {
    drawGrid(); return;
  }
  
  // ▼ 移動（ドラッグ）中の処理 ▼
  if (dragState.mode==='moving' && dragState.ghost) {
    const row = yToRow(py);
    if (row >= 0) {
      const newPitch = TOTAL_NOTES - 1 - row;
      const newBeat  = Math.max(0, snapBeat(px / BEAT_W)); // マイナス（画面外）に行かないよう制限
      dragState.ghost.pitch = newPitch;
      dragState.ghost.start = newBeat;
    }
    gridCanvas.style.cursor = 'grabbing'; // 掴んでいる状態のカーソル
    drawGrid();
    return;
  }
  
  // 何もしていない時は、ノートの上なら「手（grab）」、何もないところなら「十字（crosshair）」
  gridCanvas.style.cursor = noteAtPixel(px,py) ? 'grab' : 'crosshair';
});

gridCanvas.addEventListener('mousedown', e => {
  e.preventDefault(); const px=e.offsetX,py=e.offsetY;
  
  // 右クリック：削除
  if (e.button===2) { const t=noteAtPixel(px,py); if(t){notes.splice(notes.indexOf(t),1);drawGrid();} return; }
  if (e.button!==0) return;

  const clickedNote = noteAtPixel(px,py);
  
  // ▼ ノートをクリックした時（移動モード開始） ▼
  if (clickedNote) {
    dragState.mode = 'moving';
    // 現在のノートを「移動前の姿」としてバックアップ
    dragState.originalNote = { ...clickedNote }; 
    // ドラッグ中の「仮の姿（ghost）」を生成
    dragState.ghost = { ...clickedNote }; 
    // 一旦配列から消して、キャンバス上から元のノートを隠す
    notes.splice(notes.indexOf(clickedNote), 1); 
    drawGrid();
    return;
  }

  // ▼ 何もない場所をクリックした時（配置モード開始） ▼
  const row=yToRow(py); if(row<0)return;
  const pitch=TOTAL_NOTES-1-row, beat=snapBeat(px/BEAT_W), len=1; // 4分音符固定
  if (notes.find(n=>n.pitch===pitch&&n.start<=beat&&beat<n.start+n.duration)) return;
  dragState.mode='placing'; dragState.startX=px; dragState.ghost=newNote(pitch,beat,len); drawGrid();
});

gridCanvas.addEventListener('mouseup', e => {
  if (e.button!==0) return;
  
  if (dragState.mode==='placing' && dragState.ghost) {
    const g=dragState.ghost;
    if (!notes.find(n=>n.pitch===g.pitch&&n.start<=g.start&&g.start<n.start+g.duration)) {
      notes.push(g); playTone(pitchToHz(g.pitch,pitchOffsets[g.pitch]),0.3);
    }
  } 
  // ▼ 移動を確定する時の処理 ▼
  else if (dragState.mode==='moving' && dragState.ghost) {
    const g = dragState.ghost;
    // ドロップ先にすでに別のノートがないかチェック
    const isOverlap = notes.find(n=>n.pitch===g.pitch&&n.start<=g.start&&g.start<n.start+g.duration);
    
    if (!isOverlap) {
      notes.push(g); // 重なっていなければ新しい位置で確定
      playTone(pitchToHz(g.pitch, pitchOffsets[g.pitch]), 0.3); // 配置確定時に音を鳴らす
    } else {
      notes.push(dragState.originalNote); // 重なっていたら元の位置に戻す
    }
  }

  dragState.mode=null; dragState.ghost=null; dragState.originalNote=null; drawGrid();
});

gridCanvas.addEventListener('mouseleave',()=>{
  if (dragState.mode==='placing' && dragState.ghost) {
    notes.push(dragState.ghost);
    playTone(pitchToHz(dragState.ghost.pitch,pitchOffsets[dragState.ghost.pitch]),0.3);
  } 
  // ▼ ドラッグ中にキャンバス外に出たらキャンセルして元に戻す ▼
  else if (dragState.mode==='moving' && dragState.originalNote) {
    notes.push(dragState.originalNote);
  }
  dragState.mode=null; dragState.ghost=null; dragState.originalNote=null; drawGrid();
});

gridCanvas.addEventListener('contextmenu',e=>e.preventDefault());

document.getElementById('btn-play').addEventListener('click',()=>{if(!isPlaying)startPlay();});

// ▼ 全消去ボタンの処理（チューニング保持・リセットの分岐版） ▼
document.getElementById('btn-clear').addEventListener('click', function() {
  // 【ステップ1】まず、ノートを消すかどうかの確認
  const clearNotes = confirm('配置したノートをすべて消去しますか？\n（「キャンセル」を押すと操作を取り消します）');
  
  if (!clearNotes) {
    this.blur();
    return; // キャンセルした場合はここで終了
  }

  // 【ステップ2】次に、チューニングを初期化するかどうかの確認
  const resetTuning = confirm('チューニング（各鍵盤のセント値）もすべて ±0 にリセットしますか？\n\n・「OK」➔ チューニングも完全にリセットする\n・「キャンセル」➔ 現在のチューニング設定を残す');

  // ノートの消去処理（どちらを選んでも実行される）
  notes = [];
  playedIds.clear();

  // チューニングの初期化処理
  if (resetTuning) {
    // pitchOffsets（チューニングの配列）をすべて0に戻す
    for (let i = 0; i < pitchOffsets.length; i++) {
      pitchOffsets[i] = 0;
    }
    updateStatus('ノートとチューニングをすべて初期化しました。');
  } else {
    updateStatus('ノートを消去しました（チューニングは維持されています）。');
  }

  // 画面の再描画
  drawGrid();
  drawKeyboard(); // チューニングの見た目を更新するために鍵盤も再描画
  
  this.blur(); // フォーカスを外してスペースキーの誤爆を防ぐ
});

// ▼ ここから追加：メトロノームボタンをクリックした時の処理 ▼
document.getElementById('btn-metronome').addEventListener('click', function() {
  metronomeEnabled = !metronomeEnabled;
  this.classList.toggle('active', metronomeEnabled);
  updateStatus(`メトロノーム: ${metronomeEnabled ? 'ON' : 'OFF'}`);
  
  // 【重要】ボタンからフォーカスを外す（スペースキー再生の誤爆を防ぐため）

});


document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'&&!e.repeat){e.preventDefault();isPlaying?stopPlay():startPlay();}
  //Cキー：ループのON/OFF
  if(e.code==='KeyC'&&!e.repeat){
    e.preventDefault();
    // ループボタンをクリックしたのと同じ処理（色変更と状態切り替え）を呼び出す
    document.getElementById('btn-loop').click();
  }

  //Rキーで録音の開始/停止
  if(e.code==='KeyR'&&!e.repeat){
    e.preventDefault();
    // 録音ボタンを裏側でクリックさせる
    document.getElementById('btn-record').click();
  }

  // Kキー: メトロノームON/OFF
  if(e.code==='KeyK'&&!e.repeat){
    e.preventDefault();
    document.getElementById('btn-metronome').click(); // ボタンをクリックさせるだけ
  }

  // 矢印キー: 鍵盤ホバー中のピッチを±1セント調整
  if((e.code==='ArrowUp'||e.code==='ArrowDown')&&kbHoverRowPitch>=0){
    e.preventDefault();
    const p   = kbHoverRowPitch;
    const dir = e.code==='ArrowUp' ? 1 : -1;
    const limits = getDynamicLimits(p); // 限界値を取得
    
    // dir(±1)を加算しつつ、限界値でブロックする
    pitchOffsets[p] = Math.round(Math.max(limits.min, Math.min(limits.max, pitchOffsets[p] + dir)));
    syncCPitches(p);
    recomputeRows(); drawKeyboard(); drawGrid();
    // 短く発音してフィードバック
    playTone(pitchToHz(p, pitchOffsets[p]), 0.25);
    const ci=pitchOffsets[p], sign=ci>0?'+':'';
    updateStatus(`${NOTE_NAMES[p]}: ${ci===0?'±0':(sign+ci)}¢  (${pitchToHz(p,pitchOffsets[p]).toFixed(2)} Hz)  ← 矢印キーで±1¢調整中`);
  }
});

function updateStatus(msg){document.getElementById('status-msg').textContent=msg;}

// ============================================================
// データ収集・Supabase 送信
// ============================================================
let userId='', taskType='', musicExp='none', musicExpDetail='';
let sessionStartTime=Date.now();

// ============================================================
// メロディ課題パネル
// ============================================================
// 動き: ↑↓→↑↑↓↓  開始音: C (pitch=0)
const MELODY_MOVES = ['start','↑','↓','→','↑','↑','↓','↓'];
// Cから辿った音名シーケンス (pitch index 0=C,1=D,2=E…)
const MELODY_PITCHES = [0, 1, 0, 0, 1, 2, 1, 0]; // C D C C D E D C

function buildTaskPanel() {
  const container = document.getElementById('task-steps');
  container.innerHTML = '';
  const arrowColor = { '↑':'#00e5ff', '↓':'#ff6e9c', '→':'#aaaaaa', 'start':'#2eb86a' };

  MELODY_MOVES.forEach((move, i) => {
    const pitch    = MELODY_PITCHES[i];
    const noteName = NOTE_NAMES[pitch];
    const isStart  = move === 'start';
    const arrow    = isStart ? '●' : move;
    const color    = arrowColor[move];
    const beat     = i + 1;

    const row = document.createElement('div');
    row.style.cssText = `
      display:flex; align-items:center; gap:12px;
      padding:7px 0; border-bottom:1px solid #1e1e3a;
    `;

    // 拍番号 — オレンジで目立つように
    const beatEl = document.createElement('span');
    beatEl.textContent = beat;
    beatEl.style.cssText = `
      color:#f0a040; font-size:15px; font-weight:bold;
      width:20px; text-align:center; flex-shrink:0;
    `;

    // 矢印
    const arrowEl = document.createElement('span');
    arrowEl.textContent = arrow;
    arrowEl.style.cssText = `
      color:${color}; font-size:30px;
      width:32px; text-align:center; flex-shrink:0; line-height:1;
    `;

    // 音名
    const nameEl = document.createElement('span');
    nameEl.textContent = noteName;
    nameEl.style.cssText = `color:${color}; font-size:18px; font-weight:bold;`;

    row.appendChild(beatEl);
    row.appendChild(arrowEl);
    container.appendChild(row);
  });
}

document.getElementById('btn-submit').addEventListener('click',async()=>{
  if(!userId){alert('ユーザーIDが未設定です');return;}
  if(notes.length===0){alert('ノートが1つもありません');return;}
  const btn=document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent='送信中…';
  try {
    const bpm=90, bps=bpm/60;
    const noteHz=notes.map(n=>({note_id:n.id,pitch:n.pitch,name:NOTE_NAMES[n.pitch],hz:parseFloat(pitchToHz(n.pitch,pitchOffsets[n.pitch]).toFixed(4)),start:n.start}));
    const noteCentsFromC=notes.map(n=>{const hz=pitchToHz(n.pitch,pitchOffsets[n.pitch]);return{note_id:n.id,pitch:n.pitch,cents_from_c:parseFloat((1200*Math.log2(hz/BASE_HZ)).toFixed(2))};});
    const offsetCents=notes.map(n=>({note_id:n.id,pitch:n.pitch,offset:pitchOffsets[n.pitch]}));
    const sorted=[...notes].sort((a,b)=>a.start-b.start||a.pitch-b.pitch);
    const intervals=[];
    for(let i=1;i<sorted.length;i++){
      const p=sorted[i-1],c=sorted[i];
      intervals.push({from_note_id:p.id,to_note_id:c.id,from_name:NOTE_NAMES[p.pitch],to_name:NOTE_NAMES[c.pitch],
        interval_cents:parseFloat((1200*Math.log2(pitchToHz(c.pitch,pitchOffsets[c.pitch])/pitchToHz(p.pitch,pitchOffsets[p.pitch]))).toFixed(2))});
    }
    const pitchOffsetRecord={};
    for(let p=0;p<TOTAL_NOTES;p++) pitchOffsetRecord[p]=pitchOffsets[p];

    await supabaseInsert('sessions',{
      user_id:userId, task_type:taskType,
      music_exp:musicExp, music_exp_detail:musicExpDetail,
      bpm,
      notes:notes.map(n=>({id:n.id,pitch:n.pitch,start:n.start,duration:n.duration,velocity:n.velocity})),
      pitch_offsets:pitchOffsetRecord, note_hz:noteHz, note_cents_from_c:noteCentsFromC,
      offset_cents:offsetCents, intervals,
      duration_sec:Math.round((Date.now()-sessionStartTime)/1000),
      slider_ops:sliderOpsCount,
    });

    document.getElementById('modal-done-msg').textContent=
      `データを保存しました。ノート数: ${notes.length}件、制作時間: ${Math.round((Date.now()-sessionStartTime)/1000)}秒`;
    document.getElementById('modal-done').classList.remove('hidden');
    // 12平均律試聴ボタンを表示
    document.getElementById('btn-play12').style.display = 'inline-block';
    sliderOpsCount=0; sessionStartTime=Date.now();
  } catch(err) {
    alert(`送信エラー: ${err.message}`); console.error(err);
  }
  btn.disabled=false; btn.textContent='💾 データ保存';
});

document.getElementById('btn-done-ok').addEventListener('click',()=>{
  stop12Play();
  document.getElementById('modal-done').classList.add('hidden');
});

// ============================================================
// 12平均律 試聴プレイヤー
// ============================================================
let play12Source = null;   // AudioBufferSourceNode
let is12Playing  = false;

async function start12Play() {
  ensureAudio();
  if (notes.length === 0) return;
  const btn = document.getElementById('btn-play12');
  btn.textContent = '⏳ 生成中…'; btn.disabled = true;

  try {
    const bpm = getBpm(), bps = bpm / 60;
    const lastEnd  = notes.reduce((m, n) => Math.max(m, n.start + n.duration), 0);
    const totalSec = lastEnd / bps + 1.0;
    const sr       = audioCtx.sampleRate;

    const offCtx = new OfflineAudioContext(1, Math.ceil(totalSec * sr), sr);
    for (const n of notes) {
      const hz12     = BASE_HZ * Math.pow(2, DIATONIC_SEMITONES_12[n.pitch] / 12);
      const startSec = n.start / bps;
      const durSec   = (n.duration / bps) * 0.92;
      const vol      = (n.velocity / 127) * 0.28;

      const gain = offCtx.createGain();
      gain.gain.setValueAtTime(0, startSec);
      gain.gain.linearRampToValueAtTime(vol, startSec + 0.01);
      gain.gain.setValueAtTime(vol, startSec + durSec - 0.06);
      gain.gain.linearRampToValueAtTime(0, startSec + durSec);
      gain.connect(offCtx.destination);

      const osc = offCtx.createOscillator();
      osc.type  = 'triangle';
      osc.frequency.value = hz12;
      osc.connect(gain);
      osc.start(startSec); osc.stop(startSec + durSec);
    }

    const rendered = await offCtx.startRendering();

    play12Source = audioCtx.createBufferSource();
    play12Source.buffer = rendered;
    play12Source.connect(audioCtx.destination);
    play12Source.onended = () => {
      is12Playing = false; play12Source = null;
      btn.textContent = '🎵 12平均律で聴く ▶'; btn.disabled = false;
    };
    play12Source.start();
    is12Playing = true;
    btn.textContent = '■ 停止'; btn.disabled = false;
  } catch(err) {
    console.error('12平均律再生エラー:', err);
    btn.textContent = '🎵 12平均律で聴く ▶'; btn.disabled = false;
  }
}

function stop12Play() {
  if (play12Source) {
    try { play12Source.stop(); } catch(e) {}
    play12Source = null;
  }
  is12Playing = false;
  const btn = document.getElementById('btn-play12');
  btn.textContent = '🎵 12平均律で聴く ▶'; btn.disabled = false;
}

document.getElementById('btn-play12').addEventListener('click', () => {
  if (is12Playing) stop12Play();
  else start12Play();
});
